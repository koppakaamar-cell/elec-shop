AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Elec Shop - E-commerce Backend (API Gateway + Lambda + DynamoDB + Cognito)
Globals:
  Function:
    Runtime: nodejs18.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        PRODUCTS_TABLE:
          Ref: ProductsTable
        ORDERS_TABLE:
          Ref: OrdersTable
        USERS_TABLE:
          Ref: UsersTable
        STRIPE_SECRET_KEY:
          Ref: StripeSecretKey
Parameters:
  StripeSecretKey:
    Type: String
    Description: Stripe secret key (test mode) - provide via parameter, do not hardcode
    NoEcho: true
Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: ElecShopUserPool
      AutoVerifiedAttributes:
      - email
      UsernameAttributes:
      - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
      Schema:
      - Name: email
        Required: true
        Mutable: true
      - Name: name
        Required: false
        Mutable: true
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: ElecShopWebClient
      UserPoolId:
        Ref: UserPool
      ExplicitAuthFlows:
      - ALLOW_USER_PASSWORD_AUTH
      - ALLOW_REFRESH_TOKEN_AUTH
      - ALLOW_USER_SRP_AUTH
      GenerateSecret: false
  ProductsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ElecShop-Products
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      - AttributeName: category
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: CategoryIndex
        KeySchema:
        - AttributeName: category
          KeyType: HASH
        Projection:
          ProjectionType: ALL
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ElecShop-Orders
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      - AttributeName: userId
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: UserIdIndex
        KeySchema:
        - AttributeName: userId
          KeyType: HASH
        Projection:
          ProjectionType: ALL
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ElecShop-Users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      - AttributeName: email
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: EmailIndex
        KeySchema:
        - AttributeName: email
          KeyType: HASH
        Projection:
          ProjectionType: ALL
  RegisterUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: users.register
      CodeUri: RegisterUserFunction
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: UsersTable
      Events:
        RegisterUser:
          Type: Api
          Properties:
            Path: /users/register
            Method: POST
    Metadata:
      SamResourceId: RegisterUserFunction
  GetUserProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: users.getProfile
      CodeUri: GetUserProfileFunction
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: UsersTable
      Events:
        GetProfile:
          Type: Api
          Properties:
            Path: /users/me
            Method: GET
    Metadata:
      SamResourceId: GetUserProfileFunction
  UpdateUserProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: users.updateProfile
      CodeUri: UpdateUserProfileFunction
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: UsersTable
      Events:
        UpdateProfile:
          Type: Api
          Properties:
            Path: /users/me
            Method: PUT
    Metadata:
      SamResourceId: UpdateUserProfileFunction
  GetProductsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: products.getAll
      CodeUri: GetProductsFunction
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: ProductsTable
      Events:
        GetProducts:
          Type: Api
          Properties:
            Path: /products
            Method: GET
    Metadata:
      SamResourceId: GetProductsFunction
  GetProductByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: products.getById
      CodeUri: GetProductByIdFunction
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: ProductsTable
      Events:
        GetProduct:
          Type: Api
          Properties:
            Path: /products/{id}
            Method: GET
    Metadata:
      SamResourceId: GetProductByIdFunction
  CreateOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: orders.create
      CodeUri: CreateOrderFunction
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: OrdersTable
      Events:
        CreateOrder:
          Type: Api
          Properties:
            Path: /orders
            Method: POST
    Metadata:
      SamResourceId: CreateOrderFunction
  GetOrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: orders.getByUser
      CodeUri: GetOrdersFunction
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: OrdersTable
      Events:
        GetOrders:
          Type: Api
          Properties:
            Path: /orders
            Method: GET
    Metadata:
      SamResourceId: GetOrdersFunction
  CreatePaymentIntentFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: payments.createIntent
      CodeUri: CreatePaymentIntentFunction
      Events:
        CreatePayment:
          Type: Api
          Properties:
            Path: /payments/create-intent
            Method: POST
    Metadata:
      SamResourceId: CreatePaymentIntentFunction
Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod
  UserPoolId:
    Description: Cognito User Pool ID
    Value:
      Ref: UserPool
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value:
      Ref: UserPoolClient
  UsersTableName:
    Description: DynamoDB Users table
    Value:
      Ref: UsersTable
  ProductsTableName:
    Description: DynamoDB Products table
    Value:
      Ref: ProductsTable
  OrdersTableName:
    Description: DynamoDB Orders table
    Value:
      Ref: OrdersTable
